name: Build and publish image

# Builds the knowledge-ingestion Docker image and pushes it to Docker Hub
# as vocence/knowledge-ingestion:latest plus a short-SHA tag for every
# commit landing on main. Manually re-runnable via workflow_dispatch.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME  Docker Hub account or org with push access to vocence/*
#   DOCKERHUB_TOKEN     Docker Hub access token (NOT the account password)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            vocence/knowledge-ingestion:latest
            vocence/knowledge-ingestion:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
